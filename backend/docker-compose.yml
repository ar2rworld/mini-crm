services:
  postgres:
    image: postgres:16.10-alpine3.22
    container_name: minicrm_postgres
    environment:
      POSTGRES_DB: minicrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: